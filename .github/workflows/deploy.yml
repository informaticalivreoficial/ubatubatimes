name: Deploy Laravel to aaPanel

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'ENDSSH'
          
          git config --global --add safe.directory /www/wwwroot/ubatubatimes.com.br

          export PATH=/usr/local/node/bin:/usr/local/bin:$PATH
          export NODE_PATH=/usr/local/node/lib/node_modules:$NODE_PATH
          export PATH=/www/server/php/81/bin:$PATH

          cd /www/wwwroot/ubatubatimes.com.br

          echo "🚀 Pull do GitHub"
          git pull origin main

          echo "📦 Instalando dependências PHP..."
          composer install --no-interaction --prefer-dist --optimize-autoloader

          echo "📦 Instalando dependências Node"
          npm install
          npm run build

          echo "🔧 Permissões"
          chmod -R 775 storage bootstrap/cache
          chown -R www:www storage bootstrap/cache

          echo "⚙️ Rebuilding caches"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

          echo "🧹 Limpando caches"
          php artisan optimize:clear

          echo "🚀 Deploy finalizado!"
          
          ENDSSH